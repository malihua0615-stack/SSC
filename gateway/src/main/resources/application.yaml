server:
  port: 8082

spring:
  application:
    name: gateway

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

  gateway:
    routes:
      - id: auth
        uri: lb://auth
        predicates:
          - Path=/auth/**
      - id: order
        uri: lb://order
        predicates:
          - Path=/order/**
      - id: product
        uri: lb://product
        predicates:
          - Path=/product/**

# 添加 actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: "*"
      base-path: /actuator
  endpoint:
    gateway:
      enabled: true
jwt:
  secret: "your_very_long_and_secure_secret_key_string_here_which_is_at_least_32_bytes"
  expire: 600000
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: DEBUG

# 测试配置
test:
  config: loaded