server:
  port: 8084


spring:
  application:
    name: product

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  datasource:
    # MySQL 8.x 驱动
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/micro_mall?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: mall_user
    password: Mall@123

    # 连接池配置（使用 HikariCP）
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

